# LinaPro monthly OpenSpec archive router workflow.
# GitHub cron uses UTC. 16:00 UTC on the previous month's last day is
# 00:00 Asia/Shanghai on the 1st day of the next month.
# LinaPro 每月 OpenSpec 归档路由工作流。
# GitHub cron 使用 UTC，上月最后一天 16:00 UTC 对应北京时间下月 1 日 00:00。
name: Monthly OpenSpec Archive

on:
  # Run archive detection at 00:00 Asia/Shanghai on the 1st day of each month.
  # The February entries are guarded at runtime so leap years still run once.
  # 每月 1 日北京时间 00:00 运行归档检测；二月通过运行时门禁兼容闰年。
  schedule:
    - cron: "0 16 31 1,3,5,7,8,10,12 *"
    - cron: "0 16 30 4,6,9,11 *"
    - cron: "0 16 28 2 *"
    - cron: "0 16 29 2 *"

  # Allow maintainers to trigger archive detection manually.
  # 允许维护者手动触发归档检测。
  workflow_dispatch:

# This router may create archive pull requests, so it needs content and PR write access.
# 该路由可能创建归档 PR，因此需要内容和 PR 写权限。
permissions:
  contents: write
  pull-requests: write

# Keep a single archive router run active per trigger ref to avoid duplicate PRs for the same target.
# 每个触发 ref 只保留一个归档路由运行，避免同一目标重复创建 PR。
concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: false

# Shared defaults for OpenSpec detection and AI-tool routing.
# OpenSpec 检测和 AI 工具路由使用的共享默认值。
env:
  TZ: "Asia/Shanghai"
  OPENSPEC_VERSION: "1.3.1"
  AI_CODING_TOOL: ${{ vars.AI_CODING_TOOL || 'codex' }}

jobs:
  # Detects completed active OpenSpec changes and decides which AI workflow should archive them.
  # 检测已完成的活跃 OpenSpec 变更，并决定由哪个 AI 工作流执行归档。
  detect:
    name: Detect completed OpenSpec changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/heads/')) || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    outputs:
      has_candidates: ${{ steps.detect.outputs.has_candidates }}
      ai_coding_tool: ${{ steps.resolve.outputs.ai_coding_tool }}
      should_run: ${{ steps.monthly-window.outputs.should_run }}
      target_branch: ${{ steps.target-branch.outputs.target_branch }}
      pr_branch: ${{ steps.target-branch.outputs.pr_branch }}

    steps:
      # Guard the duplicate February schedule in leap years; manual runs are unrestricted.
      # 仅在闰年过滤二月重复定时；手动触发不受限制。
      - name: Gate Monthly Schedule Window
        id: monthly-window
        env:
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            echo "Manual dispatch bypasses the monthly schedule gate."
            exit 0
          fi

          scheduled_at="${GITHUB_EVENT_SCHEDULE:-}"
          utc_year="$(date -u +%Y)"
          echo "Schedule expression: ${scheduled_at}"
          echo "UTC runner year: ${utc_year}"

          if [ "${scheduled_at}" = "0 16 28 2 *" ] && [ "$(date -u -d "${utc_year}-02-29" +%m 2>/dev/null || true)" = "02" ]; then
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping the February 28 UTC schedule in a leap year; February 29 UTC covers March 1 Asia/Shanghai."
          else
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            echo "Scheduled run is inside the monthly archive window."
          fi

      # Resolve the branch whose OpenSpec state will be inspected and archived.
      # 解析本次用于检测和归档 OpenSpec 状态的目标分支。
      - name: Resolve Target Branch
        if: ${{ steps.monthly-window.outputs.should_run == 'true' }}
        id: target-branch
        env:
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('node:fs');

          const targetBranch = String(process.env.GITHUB_REF_NAME_VALUE || '').trim();
          if (!targetBranch) {
            console.error('Unable to resolve the workflow trigger branch.');
            process.exit(1);
          }

          const slug = targetBranch
            .toLowerCase()
            .replace(/[^a-z0-9._-]+/g, '-')
            .replace(/^-+|-+$/g, '')
            .slice(0, 80) || 'branch';
          const prBranch = `automation/monthly-openspec-archive-${slug}`;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `target_branch=${targetBranch}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `pr_branch=${prBranch}\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `Monthly OpenSpec archive target branch: ${targetBranch}\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `Monthly OpenSpec archive PR branch: ${prBranch}\n`);

          console.log(`Resolved target branch: ${targetBranch}`);
          console.log(`Resolved archive PR branch: ${prBranch}`);
          NODE

      # Configure the runner timezone before OpenSpec commands produce timestamps.
      # 在 OpenSpec 命令产出时间戳前配置 runner 时区。
      - name: Setup Timezone
        if: ${{ steps.monthly-window.outputs.should_run == 'true' }}
        run: |
          sudo ln -snf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          echo Asia/Shanghai | sudo tee /etc/timezone

      # Check out the trigger branch with full history for archive branch creation.
      # 拉取触发分支完整历史，供后续创建归档分支。
      - name: Checkout Repository
        if: ${{ steps.monthly-window.outputs.should_run == 'true' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.target-branch.outputs.target_branch }}
          fetch-depth: 0

      # Install Node for the pinned OpenSpec CLI invocation.
      # 安装 Node，用于调用固定版本 OpenSpec CLI。
      - name: Setup Node
        if: ${{ steps.monthly-window.outputs.should_run == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # Normalize and validate the configured AI coding tool name.
      # 归一化并校验配置的 AI 编码工具名称。
      - name: Resolve AI Coding Tool
        if: ${{ steps.monthly-window.outputs.should_run == 'true' }}
        id: resolve
        run: |
          set -euo pipefail

          ai_tool="$(printf '%s' "${AI_CODING_TOOL:-codex}" | tr '[:upper:]' '[:lower:]')"
          case "${ai_tool}" in
            codex|cc|copilot)
              ;;
            *)
              echo "Unsupported AI_CODING_TOOL: ${AI_CODING_TOOL}. Use 'codex', 'cc', or 'copilot'." >&2
              exit 1
              ;;
          esac

          echo "ai_coding_tool=${ai_tool}" >> "${GITHUB_OUTPUT}"
          echo "Resolved AI coding tool: ${ai_tool}"

      # Query OpenSpec and expose whether any completed active changes are ready to archive.
      # 查询 OpenSpec，并输出是否存在可归档的已完成活跃变更。
      - name: Detect Completed OpenSpec Changes
        if: ${{ steps.monthly-window.outputs.should_run == 'true' }}
        id: detect
        run: |
          npx -y "@fission-ai/openspec@${OPENSPEC_VERSION}" list --json > "${RUNNER_TEMP}/openspec-changes.json"

          node <<'NODE'
          const fs = require('node:fs');

          const data = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/openspec-changes.json`, 'utf8'));
          const changes = Array.isArray(data.changes) ? data.changes : [];
          const completedStatuses = new Set(['complete', 'completed', 'done']);
          const candidates = changes.filter((change) => completedStatuses.has(String(change.status || '').toLowerCase()));

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_candidates=${candidates.length > 0}\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `Detected ${candidates.length} completed OpenSpec change candidate(s).\n`);

          for (const change of candidates) {
            const completed = Number.isInteger(change.completedTasks) ? change.completedTasks : 'unknown';
            const total = Number.isInteger(change.totalTasks) ? change.totalTasks : 'unknown';
            console.log(`Candidate: ${change.name} status=${change.status} tasks=${completed}/${total}`);
          }
          NODE

      # End the router cleanly when there is nothing to archive.
      # 没有可归档内容时，让路由工作流干净结束。
      - name: Skip When No Completed Changes Exist
        if: ${{ steps.monthly-window.outputs.should_run == 'true' && steps.detect.outputs.has_candidates != 'true' }}
        run: |
          echo "No completed active OpenSpec changes found. Nothing to archive."

  # Delegates archive execution to the Codex reusable workflow when configured.
  # 当配置为 Codex 时，将归档执行委托给 Codex 可复用工作流。
  archive-with-codex:
    name: Archive with Codex
    needs: detect
    if: ${{ needs.detect.outputs.should_run == 'true' && needs.detect.outputs.has_candidates == 'true' && needs.detect.outputs.ai_coding_tool == 'codex' }}
    uses: ./.github/workflows/monthly-openspec-archive-codex.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      openspec_version: ${{ vars.OPENSPEC_VERSION || '1.3.1' }}
      target_branch: ${{ needs.detect.outputs.target_branch }}
      pr_branch: ${{ needs.detect.outputs.pr_branch }}
      openai_base_url: ${{ vars.OPENAI_BASE_URL }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # Delegates archive execution to the Claude Code reusable workflow when configured.
  # 当配置为 Claude Code 时，将归档执行委托给 Claude Code 可复用工作流。
  archive-with-cc:
    name: Archive with Claude Code
    needs: detect
    if: ${{ needs.detect.outputs.should_run == 'true' && needs.detect.outputs.has_candidates == 'true' && needs.detect.outputs.ai_coding_tool == 'cc' }}
    uses: ./.github/workflows/monthly-openspec-archive-cc.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      openspec_version: ${{ vars.OPENSPEC_VERSION || '1.3.1' }}
      target_branch: ${{ needs.detect.outputs.target_branch }}
      pr_branch: ${{ needs.detect.outputs.pr_branch }}
      anthropic_base_url: ${{ vars.ANTHROPIC_BASE_URL }}
      anthropic_custom_model: ${{ vars.ANTHROPIC_CUSTOM_MODEL }}
    secrets:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}

  # Delegates archive execution to the GitHub Copilot CLI reusable workflow when configured.
  # 当配置为 GitHub Copilot CLI 时，将归档执行委托给 Copilot 可复用工作流。
  archive-with-copilot:
    name: Archive with GitHub Copilot CLI
    needs: detect
    if: ${{ needs.detect.outputs.should_run == 'true' && needs.detect.outputs.has_candidates == 'true' && needs.detect.outputs.ai_coding_tool == 'copilot' }}
    uses: ./.github/workflows/monthly-openspec-archive-copilot.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      openspec_version: ${{ vars.OPENSPEC_VERSION || '1.3.1' }}
      target_branch: ${{ needs.detect.outputs.target_branch }}
      pr_branch: ${{ needs.detect.outputs.pr_branch }}
      copilot_model: ${{ vars.COPILOT_MODEL || 'auto' }}
      copilot_reasoning_effort: ${{ vars.COPILOT_REASONING_EFFORT || '' }}
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
